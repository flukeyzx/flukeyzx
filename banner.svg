<svg width="900" height="180" viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6ee7b7"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff08" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="180" fill="url(#bg)" rx="12"/>
  <rect width="900" height="180" fill="url(#grid)" rx="12"/>

  <!-- Decorative circles -->
  <circle cx="780" cy="30" r="80" fill="none" stroke="#6ee7b710" stroke-width="1"/>
  <circle cx="780" cy="30" r="55" fill="none" stroke="#3b82f610" stroke-width="1"/>
  <circle cx="780" cy="30" r="30" fill="#3b82f608"/>

  <!-- Accent line -->
  <rect x="48" y="52" width="4" height="76" rx="2" fill="url(#accent)"/>

  <!-- Name -->
  <text x="70" y="95" font-family="'Courier New', monospace" font-size="42" font-weight="700" fill="#f9fafb" letter-spacing="-1">Abdul Ahad</text>

  <!-- Role tag -->
  <rect x="70" y="108" width="210" height="26" rx="4" fill="#ffffff0d" stroke="#ffffff15" stroke-width="1"/>
  <text x="86" y="126" font-family="'Courier New', monospace" font-size="13" fill="#6ee7b7" letter-spacing="2">FULLSTACK ENGINEER</text>

  <!-- Decorative dots top right -->
  <circle cx="820" cy="140" r="2.5" fill="#6ee7b740"/>
  <circle cx="835" cy="140" r="2.5" fill="#3b82f640"/>
  <circle cx="850" cy="140" r="2.5" fill="#6ee7b740"/>
  <circle cx="820" cy="155" r="2.5" fill="#3b82f640"/>
  <circle cx="835" cy="155" r="2.5" fill="#6ee7b740"/>
  <circle cx="850" cy="155" r="2.5" fill="#3b82f640"/>

  <!-- Status indicator -->
  <circle cx="70" cy="155" r="4" fill="#22c55e"/>
  <text x="82" y="159" font-family="'Courier New', monospace" font-size="11" fill="#6b7280">available for interesting work</text>

  <!-- Corner brackets -->
  <path d="M 20 20 L 20 8 L 32 8" fill="none" stroke="#6ee7b730" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 880 20 L 880 8 L 868 8" fill="none" stroke="#6ee7b730" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 20 160 L 20 172 L 32 172" fill="none" stroke="#6ee7b730" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 880 160 L 880 172 L 868 172" fill="none" stroke="#6ee7b730" stroke-width="1.5" stroke-linecap="round"/>
</svg>
