<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="60%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6ee7b7"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="15%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#6ee7b70a"/>
      <stop offset="100%" style="stop-color:#6ee7b700"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="85%" cy="30%" r="35%">
      <stop offset="0%" style="stop-color:#3b82f608"/>
      <stop offset="100%" style="stop-color:#3b82f600"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff06" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Base -->
  <rect width="900" height="280" fill="url(#bg)" rx="14"/>
  <rect width="900" height="280" fill="url(#grid)" rx="14"/>
  <rect width="900" height="280" fill="url(#glowLeft)" rx="14"/>
  <rect width="900" height="280" fill="url(#glowRight)" rx="14"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="900" height="3" rx="1" fill="url(#accentGrad)"/>

  <!--
    Total content block height:
      Eyebrow:        14  (font ~11px + gap)
      gap:            14
      Name:           58  (font-size)
      Underline+gap:  18
      Specialisation: 14
      gap:            20
      Status row:     14
      gap:            12
      Email:          14
    Total ~178px
    Center of 280 = 140, so start at 140 - 89 = 51
    Eyebrow baseline = 51 + 11 = 62
  -->

  <!-- Eyebrow -->
  <text x="60" y="62" font-family="'Courier New', monospace" font-size="11" fill="#4b5563" letter-spacing="4">SOFTWARE ENGINEER</text>

  <!-- Name -->
  <text x="56" y="128" font-family="'Courier New', monospace" font-size="58" font-weight="700" fill="#f9fafb" letter-spacing="-2">Abdul Ahad</text>

  <!-- Accent underline -->
  <rect x="56" y="138" width="380" height="2.5" rx="1.5" fill="url(#accentGrad)" opacity="0.8"/>

  <!-- Specialisation -->
  <text x="58" y="162" font-family="'Courier New', monospace" font-size="14" fill="#6b7280" letter-spacing="1">Fullstack · PERN Stack · TypeScript</text>

  <!-- Status -->
  <circle cx="58" cy="196" r="5" fill="#22c55e"/>
  <circle cx="58" cy="196" r="9" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
  <text x="76" y="200" font-family="'Courier New', monospace" font-size="12" fill="#6b7280" letter-spacing="1">Open to interesting work</text>

  <!-- Email -->
  <text x="58" y="224" font-family="'Courier New', monospace" font-size="11" fill="#374151" letter-spacing="1">ahadcodes.dev@gmail.com</text>

  <!-- ── Right decorative cluster ── -->
  <circle cx="780" cy="100" r="130" fill="none" stroke="#6ee7b706" stroke-width="1"/>
  <circle cx="780" cy="100" r="95" fill="none" stroke="#3b82f608" stroke-width="1"/>
  <circle cx="780" cy="100" r="60" fill="none" stroke="#6ee7b70a" stroke-width="1"/>
  <circle cx="780" cy="100" r="28" fill="#3b82f605"/>

  <circle cx="720" cy="200" r="2" fill="#6ee7b722"/>
  <circle cx="738" cy="200" r="2" fill="#6ee7b712"/>
  <circle cx="756" cy="200" r="2" fill="#3b82f622"/>
  <circle cx="774" cy="200" r="2" fill="#6ee7b712"/>
  <circle cx="792" cy="200" r="2" fill="#3b82f618"/>
  <circle cx="720" cy="218" r="2" fill="#3b82f612"/>
  <circle cx="738" cy="218" r="2" fill="#6ee7b722"/>
  <circle cx="756" cy="218" r="2" fill="#6ee7b712"/>
  <circle cx="774" cy="218" r="2" fill="#3b82f622"/>
  <circle cx="792" cy="218" r="2" fill="#6ee7b718"/>
  <circle cx="720" cy="236" r="2" fill="#6ee7b712"/>
  <circle cx="738" cy="236" r="2" fill="#3b82f612"/>
  <circle cx="756" cy="236" r="2" fill="#6ee7b722"/>
  <circle cx="774" cy="236" r="2" fill="#6ee7b712"/>
  <circle cx="792" cy="236" r="2" fill="#3b82f618"/>

  <!-- Corner brackets -->
  <path d="M 22 30 L 22 16 L 36 16" fill="none" stroke="#6ee7b740" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 878 30 L 878 16 L 864 16" fill="none" stroke="#6ee7b740" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 22 250 L 22 264 L 36 264" fill="none" stroke="#6ee7b740" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 878 250 L 878 264 L 864 264" fill="none" stroke="#6ee7b740" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
